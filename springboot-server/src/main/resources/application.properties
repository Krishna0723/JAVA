# Server Configuration
server.port=4000
server.servlet.context-path=

# Spring Application Name
spring.application.name=user-auth-service

# MongoDB Configuration
# Update the following with your MongoDB connection string
spring.data.mongodb.uri=mongodb://localhost:27017/user-auth-db
# OR use these properties:
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=user-auth-db

# Logging Configuration
logging.level.root=INFO
logging.level.com.app=DEBUG

# JWT Configuration
jwt.secret=your-super-secret-key-change-this-in-production-environment
jwt.expiration=3600000

# CORS Configuration (additional settings if needed)
cors.allowed-origins=*
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
